document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"8b3f10df-17de-4f92-83a3-c4145918732d\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n  <style>/* ============================================================\n   COLORS — Aprendly (official palette v2.0)\n   ============================================================ */\n:root {\n  /* ── Core brand (digital product base) ───────────────────── */\n  --color-primary:        #0c91b7;  /* links, headers, footers, CTAs, table headers */\n  --color-primary-700:    #0a7a9c;  /* gradient end / hover-dark of primary */\n  --color-primary-800:    #086780;  /* pressed primary */\n  --color-sky:            #caeffe;  /* secondary buttons, highlight rows, chips */\n  --color-sky-soft:       #ebf9ff;  /* alt rows, soft highlight backgrounds */\n  --color-white:          #ffffff;  /* default light background */\n  --color-ink:            #1f1f1e;  /* dark background / high-contrast elements */\n\n  /* ── Neutrals (text + surfaces) ──────────────────────────── */\n  --color-bg:             #ffffff;\n  --color-bg-muted:       #f4f9fb;  /* page background, derived from sky family */\n  --color-surface:        #ffffff;\n  --color-border:         #dceef4;  /* hairline borders, derived from sky */\n  --color-border-strong:  #b9e0ec;\n  --color-text:           #1f2a2e;  /* primary text */\n  --color-text-muted:     #5b6b71;  /* secondary text */\n  --color-text-subtle:    #8a979c;  /* tertiary / captions */\n  --color-text-on-primary:#ffffff;\n\n  /* ── Semantic (alerts, status) — pastel bg + dark same-family text ── */\n  --color-success:        #1f8a5b;\n  --color-success-bg:     #e3f6ec;\n  --color-warning:        #9a6a00;\n  --color-warning-bg:     #fff3d6;\n  --color-danger:         #c0392b;\n  --color-danger-bg:      #fde4e1;\n  --color-info:           #0a7a9c;\n  --color-info-bg:        #ebf9ff;\n\n  /* ── Frequency / performance tiers (used in editais + reports) ── */\n  --tier-high:            #c0392b;  /* very frequent / critical */\n  --tier-high-bg:         #fde4e1;\n  --tier-mid:             #c2740f;  /* moderate */\n  --tier-mid-bg:          #fdeccd;\n  --tier-lowmid:          #9a8200;  /* low-moderate */\n  --tier-lowmid-bg:       #fbf4c8;\n  --tier-low:             #1f8a5b;  /* infrequent / good */\n  --tier-low-bg:          #e3f6ec;\n\n  /* ── Extended palette (17) — cards, charts, bars, illustration ONLY.\n        Never for body text, links, or navigation. Assign one fixed\n        hue per category/series; do not rotate randomly. ─────────── */\n  --ext-1:  #FFB3B3;  --ext-2:  #FFCBA4;  --ext-3:  #FFE5A0;\n  --ext-4:  #D4F0A0;  --ext-5:  #A8E6CF;  --ext-6:  #A0D8EF;\n  --ext-7:  #C3B1E1;  --ext-8:  #D4ECD4;  --ext-9:  #EDD4D4;\n  --ext-10: #b29081;  --ext-11: #b4b4b4;  --ext-12: #bfbda6;\n  --ext-13: #fa9a9a;  --ext-14: #bbe9ff;  --ext-15: #fae0b6;\n  --ext-16: #a7ddb8;  --ext-17: #fabbf6;\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   RADII — Aprendly\n   Every table/card element MUST be rounded — no square corners.\n   4 small · 6 buttons/list items · 12 cards · 14–20 large containers · pill\n   ============================================================ */\n:root {\n  --radius-xs:   4px;   /* small elements */\n  --radius-sm:   6px;   /* buttons, list items */\n  --radius-md:   12px;  /* cards */\n  --radius-lg:   16px;  /* large containers */\n  --radius-xl:   20px;  /* extra-large containers / cover panels */\n  --radius-pill: 999px; /* badges, chips, avatars, progress indicators */\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   SHADOWS — Aprendly\n   Cards always carry a soft shadow + rounded corner.\n   Shadows are tinted with the primary (cyan) ink, never neutral black.\n   ============================================================ */\n:root {\n  --shadow-xs:    0 1px 2px rgba(12,145,183,0.08);\n  --shadow-sm:    0 2px 8px rgba(12,145,183,0.10);\n  --shadow-md:    0 4px 16px rgba(12,145,183,0.12);\n  --shadow-lg:    0 10px 30px rgba(12,145,183,0.16);\n  --shadow-card:  0 2px 16px rgba(12,145,183,0.10);  /* default card */\n  --shadow-cover: 0 18px 50px rgba(10,122,156,0.30); /* dark covers / hero */\n  --ring-focus:   0 0 0 3px rgba(12,145,183,0.35);   /* focus ring */\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   GRADIENTS — Aprendly\n   Headers/footers/covers are ALWAYS gradient — never flat solid.\n   ============================================================ */\n:root {\n  /* Header / CTA on light backgrounds */\n  --gradient-header: linear-gradient(135deg, #0c91b7, #0a7a9c); /* @kind color */\n  /* Footer / covers / dark panels */\n  --gradient-cover:  linear-gradient(160deg, #1f1f1e, #0c91b7); /* @kind color */\n  /* Brand owl / ring decoration (cyan → deep blue, matches logo) */\n  --gradient-brand:  linear-gradient(135deg, #1bb4d6, #0c91b7 45%, #15407e); /* @kind color */\n  /* Soft highlight wash */\n  --gradient-soft:   linear-gradient(135deg, #ebf9ff, #caeffe); /* @kind color */\n}\n<\u002Fstyle>\n  <script src=\"cd97e0a3-c53a-4f03-8d0e-dc970b9db942\"><\u002Fscript>\n  <script src=\"fe8ab187-ec3c-4241-a62b-6b96ab54dcd5\"><\u002Fscript>\n  \n  <style>\n    *, *::before, *::after { box-sizing: border-box; }\n    body { margin: 0; background: #f0f6fa; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 13px; line-height: 1.6; color: #1a2e35; }\n    @media print { .no-print { display: none !important; } body { background: #fff; } }\n\n    @media (max-width: 600px) {\n      .main-wrap { padding: 12px 10px 40px !important; }\n      .header-wrap { padding: 18px 16px !important; border-radius: 12px !important; }\n      .header-title { font-size: 19px !important; }\n      .header-badge { font-size: 11px !important; padding: 6px 11px !important; }\n      .head erif;z-index:1;\">5<\u002Fdiv>\n          <div style=\"font-size:11px;font-weight:700;color:#1a2e35;text-align:center;margin-top:6px;line-height:1.3;max-width:85px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;\">Nomeação<\u002Fdiv>\n          <div style=\"font-size:10px;color:#4a6b75;text-align:center;margin-top:2px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;\">Fase administrativa<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:16px;font-size:11px;color:#4a6b75;background:#e8f6fb;border-radius:8px;padding:8px 12px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;\">\n        ⚠️ <strong>Etapas ✓ concluídas no simulado.<\u002Fstrong> *Redação não consta do Edital TJAL 01/2024 oficialmente — incluída com peso 1 a pedido para fins de simulado. Etapa 3 (classificação) depende do desempenho real dos demais candidatos. Etapas 4 e 5 são fases administrativas subsequentes.\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- datas -->\n    <div style=\"font-size:13px;font-weight:700;color:#00637f;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:14px;padding-bottom:6px;border-bottom:2px solid #49bfe0;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;\">Datas do Concurso Real<\u002Fdiv>\n    <div style=\"background:#fff;border:1px solid #d4eaf3;border-radius:12px;padding:18px 20px;box-shadow:0 2px 12px rgba(0,99,127,0.08);\">\n      <div class=\"dates-grid\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;padding-bottom:10px;border-bottom:1px solid #d4eaf3;\"><span style=\"font-size:12.5px;color:#4a6b75;\">Prova aplicada<\u002Fspan><strong style=\"font-size:13px;color:#1a2e35;\">14/07/2024<\u002Fstrong><\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;align-items:center;padding-bottom:10px;border-bottom:1px solid #d4eaf3 ;letter-spacing:0.06em;margin-bottom:14px;padding-bottom:6px;border-bottom:2px solid #49bfe0;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;\">4. Visualizações Gráficas<\u002Fdiv>\n\n    <div style=\"background:#fff;border:1px solid #d4eaf3;border-radius:12px;padding:18px;box-shadow:0 2px 12px rgba(0,99,127,0.08);margin-bottom:16px;\">\n      <div style=\"font-size:12px;font-weight:700;color:#00637f;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.05em;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;\">Taxa de Acerto por Matéria (%)<\u002Fdiv>\n      <div style=\"position:relative;height:260px;\"><canvas id=\"barChart\"><\u002Fcanvas><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;\">\n      <div style=\"background:#fff;border:1px solid #d4eaf3;border-radius:12px;padding:18px;box-shadow:0 2px 12px rgba(0,99,127,0.08);\">\n        <div style=\"font-size:12px;font-weight:700;color:#00637f;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.05em;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;\">Acerto Total (Donut)<\u002Fdiv>\n        <div style=\"position:relative;height:200px;\"><canvas id=\"donutChart\"><\u002Fcanvas><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #d4eaf3;border-radius:12px;padding:18px;box-shadow:0 2px 12px rgba(0,99,127,0.08);\">\n        <div style=\"font-size:12px;font-weight:700;color:#00637f;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.05em;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;\">Comparativo de Notas<\u002Fdiv>\n        <div style=\"position:relative;height:200px;\"><canvas id=\"notasChart\"><\u002Fcanvas><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"background:#fff;border:1px solid #d4eaf3;border-radius:12px;padding:18px;box-shadow:0 2px 12px rgba(0,99,127,0.08);\">\n      <div style=\"font-size:12px;font-weight:700;color:#00637f;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.05em;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;\">Radar de Desempenho por Disciplina<\u002Fdiv>\n      <div style=\"position:relative;height:320px;max-width:480px;margin:0 auto;\"><canvas id=\"radarChart\"><\u002Fcanvas><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ═══════════ 5 · MEMÓRIA DE CÁLCULO ═══════════ -->\n  <sc-if value=\"{{ showCalc }}\" hint-placeholder-val=\"{{ false }}\">\n  <div>\n    <div style=\"font-size:13px;font-weight:700;color:#00637f;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:14px;padding-bottom:6px;border-bottom:2px solid #49bfe0;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;\">5. Memória de Cálculo Detalhado<\u002Fdiv>\n\n    <div style=\"background:#fff;border:1px solid #d4eaf3;border-radius:12px;padding:20px;box-shadow:0 2px 12px rgba(0,99,127,0.08);margin-bottom:16px;\">\n      <div style=\"font-weight:700;color:#00637f;margin-bottom:12px;font-size:13px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;\">5.1 — Nota das Provas Objetivas (Edital, item 9.2)<\u002Fdiv>\n      <div class=\"calc-table-wrap\" style=\"overflow:hidden;overflow-x:auto;border-radius:8px;border:1px solid #d4eaf3;margin-bottom:14px;\">\n        <table style=\"width:100%;border-collapse:collapse;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:12px;\">\n          <thead>\n            <tr>\n              <th style=\"background:#00637f;color:#fff;padding:9px 13px;font-weight:700;font-size:11px;text-align:left;letter-spacing:0.04em;text-transform:uppercase;\">Bloco<\u002Fth>\n              <th style=\"background:#00637f;color:#fff;padding:9px 13px;font-weight:700;font-size:11px;text-align:center;letter-spacing:0.04em;text-transform:uppercase;\">Questões<\u002Fth>\n              <th style=\"background:#00637f;color:#fff;padding:9px 13px;font-weight:700;font-size:11px;text-align:center;letter-spacing:0.04em;text-transform:uppercase;\">Acertos<\u002Fth>\n              <th style=\"background:#00637f;color:#fff;padding:9px 13px;font-weight:700;font-size:11px;text-align:center;letter-spacing:0.04em;text-transform:uppercase;\">Nota (0–10)<\u002Fth>\n              <th style=\"background:#00637f;color:#fff;padding:9px 13px;font-weight:700;font-size:11px;text-align:center;letter-spacing:0.04em;text-transform:uppercase;\">Peso<\u002Fth>\n              <th style=\"background:#00637f;color:#fff;padding:9px 13px;font-weight:700;font-size:11px;text-align:center;letter-spacing:0.04em;text-transform:uppercase;\">Produto<\u002Fth>\n            <\u002Ftr>\n          <\u002Fthead>\n          <tbody>\n            <tr style=\"background:#fff;\">\n              <td style=\"padding:9px 13px;font-weight:600;border-bottom:1px solid #d4eaf3;\">Conhecimentos Gerais (QST 1–30)<\u002Ftd>\n              <td style=\"padding:9px 13px;text-align:center;border-bottom:1px solid #d4eaf3;\">30<\u002Ftd>\n              <td style=\"padding:9px 13px;text-align:center;font-weight:600;border-bottom:1px solid #d4eaf3;\">23<\u002Ftd>\n              <td style=\"padding:9px 13px;text-align:center;border-bottom:1px solid #d4eaf3;\">23 ÷ 30 × 10 = <strong>7,67<\u002Fstrong><\u002Ftd>\n              <td style=\"padding:9px 13px;text-align:center;font-weight:600;border-bottom:1px solid #d4eaf3;\">1<\u002Ftd>\n              <td style=\"padding:9px 13px;text-align:center;border-bottom:1px solid #d4eaf3;\">7,67 × 1 = <strong>7,67<\u002Fstrong><\u002Ftd>\n            <\u002Ftr>\n            <tr style=\"background:#e8f6fb;\">\n              <td style=\"padding:9px 13px;font-weight:600;\">Conhecimentos Específicos (QST 31–60)<\u002Ftd>\n              <td style=\"padding:9px 13px;text-align:center;\">30<\u002Ftd>\n              <td style=\"padding:9px 13px;text-align:center;font-weight:600;\">26<\u002Ftd>\n              <td style=\"padding:9px 13px;text-align:center;\">26 ÷ 30 × 10 = <strong>8,67<\u002Fstrong><\u002Ftd>\n              <td style=\"padding:9px 13px;text-align:center;font-weight:600;\">2<\u002Ftd>\n              <td style=\"padding:9px 13px;text-align:center;\">8,67 × 2 = <strong>17,34<\u002Fstrong><\u002Ftd>\n            <\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n\n      <div style=\"background:#e8f6fb;border:1px solid #49bfe0;border-radius:10px;padding:14px 18px;font-size:12.5px;margin:10px 0;font-family:'Courier New',Courier,monospace;line-height:2.1;\">\n        <strong style=\"font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;\">Média Ponderada Objetiva (SEM redação):<\u002Fstrong><br>\n        Nota = (7,67 × 1 + 8,67 × 2) ÷ (1 + 2)<br>\n        Nota = (7,67 + 17,34) ÷ 3 = 25,01 ÷ 3 = 8,3333<br>\n        → Arredondamento (item 14.4): 3ª casa = 3 &lt; 5 → mantém<br>\n        <strong style=\"font-size:14px;color:#00637f;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;\">Nota Objetiva Final = 8,33<\u002Fstrong>\n      <\u002Fdiv>\n\n      <div style=\"font-weight:700;color:#00637f;margin:18px 0 10px;font-size:13px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;\">5.2 — Nota Final com Redação (peso 1, simulado)<\u002Fdiv>\n      <div style=\"font-size:12px;color:#4a6b75;margin-bottom:8px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;\">⚠️ O Edital TJAL 01/2024 (Cap. 7) não prevê redação. Incluída com peso 1 a pedido, exclusivamente para fins de simulado.<\u002Fdiv>\n\n      <div style=\"background:#e8f6fb;border:1px solid #49bfe0;border-radius:10px;padding:14px 18px;font-size:12.5px;margin:10px 0;font-family:'Courier New',Courier,monospace;line-height:2.1;\">\n        <strong style=\"font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;\">Nota Final (COM redação, peso 1 — cálculo do simulado):<\u002Fstrong><br>\n        Nota = (8,3333 × 3 + 6,90 × 1) ÷ (3 + 1)<br>\n        Nota = (25,0000 + 6,90) ÷ 4 = 31,90 ÷ 4 = 7,9750<br>\n        → Arredondamento (item 14.4): 3ª casa = 5 ≥ 5 → arredonda para cima<br>\n        <stro 16, Q17). Revisar questões de interpretação.<\u002Fli>\n          <li>Dir. Processual Civil: 80% (erro Q48). Revisar ponto específico da questão.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <!-- Card 3 — Estratégia de Estudos -->\n      <div style=\"background:#edf6ff;border:1px solid #a8d4f5;border-radius:12px;padding:18px 20px;box-shadow:0 2px 10px rgba(0,99,180,0.07);\">\n        <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:12px;\">\n          <span style=\"font-size:20px;\">📚<\u002Fspan>\n          <span style=\"font-size:13px;font-weight:700;color:#004e8a;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;\">Estratégia de Estudos<\u002Fspan>\n        <\u002Fdiv>\n        <ul style=\"margin:0;padding-left:16px;font-size:12.5px;color:#002240;line-height:1.7;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;\">\n          <li><strong>Semana 1-2:<\u002Fstrong> Intensificar Dir. Processual Penal — resolução de 50 questões semanais.<\u002Fli>\n          <li><strong>Semana 3-4:<\u002Fstrong> Legislação Específica AL — foco no Código de Organização Judiciária e RJU-AL.<\u002Fli>\n          <li><strong>Contínuo:<\u002Fstrong> Língua Portuguesa — morfossintaxe e propriedade vocabular para prova e redação.<\u002Fli>\n          <li>Manter as disciplinas fortes com revisão espaçada (1x por semana).<\u002Fli>\n          <li>Praticar redação semanal com autoavaliação pelos critérios da FCC.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <!-- Card 4 — Análise Competitiva -->\n      <div style=\"background:#f3f0ff;border:1px solid #c8bcf5;border-radius:12px;padding:18px 20px;box-shadow:0 2px 10px rgba(80,40,180,0.07);\">\n        <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:12px;\">\n          <span style=\"font-size:20px;\">🔍<\u002Fspan>\n          <span style=\"font-size:13px;font-weight:700;color:#3d1f8a;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;\">Análise Competitiva<\u002Fspan>\n e6b;border-radius:8px;padding:12px 16px;margin-bottom:10px;font-size:12.5px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;\">\n      <div style=\"font-weight:700;color:#1a9e6b;font-size:12px;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:5px;\">✅ Aprovada e Habilitada<\u002Fdiv>\n      A nota objetiva <strong>8,33<\u002Fstrong> supera o mínimo de 6,00 (ampla concorrência) e 4,80 (cotas), conforme item 9.3 do Edital. Resultado: aprovada e habilitada nas duas listas. Margem de segurança expressiva — <strong>+2,33 pontos<\u002Fstrong> acima do corte geral.\n    <\u002Fdiv>\n\n    <div style=\"background:linear-gradient(90deg,#fff8e8,#fffdf5);border-left:4px solid #c97b1a;border-radius:8px;padding:12px 16px;margin-bottom:10px;font-size:12.5px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;\">\n      <div style=\"font-weight:700;color:#c97b1a;font-size:12px;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:5px;\">⚠️ Arredondamento (Item 14.4)<\u002Fdiv>\n      Notas calculadas com <strong>2 casas decimais<\u002Fstrong>; arredonda para cima quando a 3ª casa decimal for ≥ 5. Exemplo: 7,9750 → 7,98. A nota objetiva 8,3333 foi mantida em 8,33 (3ª casa = 3 &lt; 5).\n    <\u002Fdiv>\n\n    <div style=\"background:linear-gradient(90deg,#fff8e8,#fffdf5);border-left:4px solid #c97b1a;border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:12.5px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;\">\n      <div style=\"font-weight:700;color:#c97b1a;font-size:12px;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:5px;\">📌 Critério de Desempate (Item 10.4)<\u002Fdiv>\n      Em caso de empate na nota final: 1º — maior nota em Conhecimentos Específicos; 2º — maior nota em Língua Portuguesa; 3º — maior idade. Lucilene está bem posicionada no 1º critério (<strong>8,67 em CE<\u002Fstrong>).\n    <\u002Fdiv>\n\n    <!-- footer note -->\n    <div style=\"background:#fff;border:1px solid #d4eaf3;border-radius:12px;padding:16px 18px;box-shadow:0 2px 12px rgba(0,99,127,0.08);margin-bottom:16px;\">\n      <p style=\"margin:0;font-size:12px;color:#4a6b75;line-height:1.65;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;\"><strong>Nota:<\u002Fstrong> relatório elaborado com base nos dados do simulado e nas regras do Edital TJAL nº 01/2024 (Fundação Carlos Chagas). A etapa de redação não consta do edital oficial — incluída com peso 1 a pedido, para fins de análise. Pesos oficiais: Conhecimentos Gerais = 1 e Conhecimentos Específicos = 2 (item 9.2). Validade do concurso: 2 anos após homologação, prorrogável por igual período.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"no-print\" style=\"display:flex;gap:10px;\">\n      <button onclick=\"{{ doPrint }}\" style=\"border:none;cursor:pointer;background:linear-gradient(135deg,#00637f,#0c91b7);color:#fff;padding:10px 20px;border-radius:8px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:700;font-size:13px;box-shadow:0 2px 8px rgba(0,99,127,0.25);\">Exportar PDF<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ═══════════ FOOTER ═══════════ -->\n  <div class=\"footer-bar\" style=\"background:#00637f;color:rgba(255,255,255,0.85);border-radius:12px;padding:15px 22px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;font-size:11px;margin-top:24px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;\">\n    <div><strong style=\"color:#fff;\">Relatório de Desempenho · Lucilene<\u002Fstrong> | TJAL 2024 — Técnico Judiciário Área Judiciária | Banca: FCC<\u002Fdiv>\n    <div>Edital nº 01/2024 · Pesos: Gerais=1, Específicos=2 · Arredondamento: item 14.4<\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:920,&quot;height&quot;:800}}\">\nclass Component extends DCLogic {\n  state = { tab: 'resumo' };\n\n  setTab(t) { this.setState({ tab: t }); }\n\n  initCharts(attempt = 0) {\n    if (typeof Chart === 'undefined') { setTimeout(() => this.initCharts(), 300); return; }\n    // Poll until canvas elements are in the DOM (sc-if may not have mounted them yet)\n    const probe = document.getElementById('barChart');\n    if (!probe) {\n      if (attempt < 20) setTimeout(() => this.initCharts(attempt + 1), 100);\n      return;\n    }\n    const HN = \"'Helvetica Neue', Helvetica, Arial, sans-serif\";\n\n    const safe = (id, fn) => {\n      const el = document.getElementById(id);\n      if (!el) return;\n      const prev = Chart.getChart(el);\n      if (prev) prev.destroy();\n      fn(el.getContext('2d'));\n    };\n\n    safe('barChart', ctx => new Chart(ctx, {\n      type: 'bar',\n      data: {\n        labels: ['Língua\\nPortuguesa', 'Leg.\\nEspecífica', 'Dir.\\nAdministrativo', 'Dir.\\nConstitucional', 'Dir.\\nCivil', 'Dir. Proc.\\nCivil', 'Dir.\\nPenal', 'Dir. Proc.\\nPenal'],\n        datasets: [{\n          label: 'Taxa de Acerto (%)',\n          data: [80, 70, 100, 100, 100, 80, 80, 60],\n          backgroundColor: ['#1a9e6b','#0c91b7','#1a9e6b','#1a9e6b','#1a9e6b','#0c91b7','#0c91b7','#c97b1a'],\n          borderRadius: 6, borderSkipped: false,\n        }]\n      },\n      options: {\n        responsive: true, maintainAspectRatio: false,\n        plugins: { legend: { display: false } },\n        scales: {\n          x: { grid: { display: false }, ticks: { font: { size: 10, family: HN }, color: '#4a6b75' } },\n          y: { min: 0, max: 110, grid: { color: '#e8f6fb' }, ticks: { callback: v => v + '%', font: { size: 10, family: HN }, color: '#4a6b75' } }\n        }\n      }\n    }));\n\n    safe('donutChart', ctx => {\n      new Chart(ctx, {\n        type: 'doughnut',\n        data: {\n          labels: ['Acertos', 'Erros'],\n          datasets: [{ data: [49, 11], backgroundColor: ['#0c91b7', '#cceffe'], borderWidth: 3, borderColor: '#fff', hoverOffset: 6 }]\n        },\n        options: {\n          responsive: true, maintainAspectRatio: false, cutout: '65%',\n          plugins: { legend: { position: 'bottom', labels: { font: { size: 11, family: HN } } } }\n        },\n        plugins: [{\n          id: 'ct',\n          afterDraw(chart) {\n            const { width, height, ctx } = chart;\n            ctx.save();\n            ctx.font = `bold 20px ${HN}`;\n            ctx.fillStyle = '#00637f';\n            ctx.textAlign = 'center';\n            ctx.textBaseline = 'middle';\n            ctx.fillText('81,67%', width / 2, height / 2 - 10);\n            ctx.font = `11px ${HN}`;\n            ctx.fillStyle = '#4a6b75';\n            ctx.fillText('49 / 60', width / 2, height / 2 + 13);\n            ctx.restore();\n          }\n        }]\n      });\n    });\n\n    safe('notasChart', ctx => new Chart(ctx, {\n      type: 'bar',\n      data: {\n        labels: ['Nota Obj.', 'c/ Redação', 'Redação', 'Mín. Geral', 'Mín. Cotas'],\n        datasets: [{\n          data: [8.33, 7.98, 6.90, 6.00, 4.80],\n          backgroundColor: ['#00637f', '#0c91b7', '#49bfe0', '#e74c3c', '#e67e22'],\n          borderRadius: 6, borderSkipped: false,\n        }]\n      },\n      options: {\n        responsive: true, maintainAspectRatio: false,\n        plugins: { legend: { display: false } },\n        scales: {\n          x: { grid: { display: false }, ticks: { font: { size: 9, family: HN }, color: '#4a6b75' } },\n          y: { min: 0, max: 11, grid: { color: '#e8f6fb' }, ticks: { font: { size: 10, family: HN }, color: '#4a6b75' } }\n        }\n      }\n    }));\n\n    safe('radarChart', ctx => new Chart(ctx, {\n      type: 'radar',\n      data: {\n        labels: ['Língua\\nPortuguesa', 'Leg.\\nEspecífica', 'Dir.\\nAdministrativo', 'Dir.\\nConstitucional', 'Dir.\\nCivil', 'Dir. Proc.\\nCivil', 'Dir.\\nPenal', 'Dir. Proc.\\nPenal'],\n        datasets: [{\n          label: 'Lucilene (%)',\n          data: [80, 70, 100, 100, 100, 80, 80, 60],\n          backgroundColor: 'rgba(12,145,183,0.18)',\n          borderColor: '#0c91b7', borderWidth: 2,\n          pointBackgroundColor: '#00637f', pointRadius: 5,\n        }]\n      },\n      options: {\n        responsive: true, maintainAspectRatio: false,\n        plugins: { legend: { display: true, position: 'bottom', labels: { font: { size: 11, family: HN } } } },\n        scales: {\n          r: {\n            min: 0, max: 100,\n            ticks: { stepSize: 25, font: { size: 9, family: HN }, color: '#4a6b75', backdropColor: 'transparent', callback: v => v + '%' },\n            grid: { color: '#d4eaf3' },\n            pointLabels: { font: { size: 9.5, family: HN }, color: '#1a2e35' }\n          }\n        }\n      }\n    }));\n  }\n\n  componentDidMount() {}\n  componentDidUpdate() {}\n\n  renderVals() {\n    const tab = this.state.tab;\n    // Trigger chart init from renderVals — componentDidUpdate does not fire in DCLogic\n    if (tab === 'graf') {\n      if (!this._chartsInit) {\n        this._chartsInit = true;\n        setTimeout(() => this.initCharts(), 400);\n      }\n    } else {\n      this._chartsInit = false;\n    }\n    const act = id => tab === id;\n    const bg = id => act(id) ? 'linear-gradient(135deg,#00637f,#0c91b7)' : 'transparent';\n    const fg = id => act(id) ? '#ffffff' : '#4a6b75';\n\n    const rawMat = [\n      ['Língua Portuguesa',      'Gerais',     16, 20, 80,  '1'],\n      ['Leg. Específica – AL',   'Específicos', 7, 10, 70,  '1'],\n      ['Dir. Administrativo',    'Específicos', 5,  5, 100, '2'],\n      ['Dir. Constitucional',    'Específicos', 5,  5, 100, '2'],\n      ['Dir. Civil',             'Específicos', 5,  5, 100, '2'],\n      ['Dir. Processual Civil',  'Específicos', 4,  5, 80,  '2'],\n      ['Dir. Penal',             'Específicos', 4,  5, 80,  '2'],\n      ['Dir. Processual Penal',  'Específicos', 3,  5, 60,  '2'],\n    ];\n\n    const barColorOf = t => t >= 80 ? '#1a9e6b' : t >= 70 ? '#0c91b7' : t >= 50 ? '#c97b1a' : '#c0392b';\n    const pillBgOf   = t => t >= 80 ? '#e8f8f2' : t >= 70 ? '#e8f6fb' : t >= 50 ? '#fef6e8' : '#fdecea';\n    const pillFgOf   = t => t >= 80 ? '#1a9e6b' : t >= 70 ? '#0c91b7' : t >= 50 ? '#c97b1a' : '#c0392b';\n\n    const materias = rawMat.map(([nome, bloco, acertos, total, taxa, peso], i) => ({\n      nome, bloco, acertos, total, taxa, peso,\n      taxaLabel: taxa + '%',\n      rowBg: i % 2 === 0 ? '#fff' : '#e8f6fb',\n      barColor: barColorOf(taxa),\n      barWidth: taxa + '%',\n      pillBg: pillBgOf(taxa),\n      pillFg: pillFgOf(taxa),\n    }));\n\n    const HN = \"'Helvetica Neue', Helvetica, Arial, sans-serif\";\n    const bd = '1px solid #d4eaf3';\n    // Build full table (thead + tbody) via React to avoid HTML-parser reordering\n    const thStyle = (align = 'left') => ({\n      background:'#00637f', color:'#fff', padding:'10px 13px', fontWeight:700,\n      fontSize:'11px', textAlign:align, letterSpacing:'0.04em', textTransform:'uppercase',\n      fontFamily:HN, whiteSpace:'nowrap',\n    });\n    const thead = React.createElement('thead', null,\n      React.createElement('tr', null,\n        React.createElement('th', { style: thStyle('left') }, 'Matéria'),\n        React.createElement('th', { style: thStyle('center') }, 'Bloco'),\n        React.createElement('th', { style: thStyle('center') }, 'Acertos'),\n        React.createElement('th', { style: thStyle('center') }, 'Total'),\n        React.createElement('th', { style: thStyle('center') }, 'Taxa'),\n        React.createElement('th', { style: { ...thStyle('center'), width:'120px' } }, 'Progresso'),\n        React.createElement('th', { style: thStyle('center') }, 'Peso'),\n      )\n    );\n\n    const materiaBodyRows = [\n      ...rawMat.map(([nome, bloco, acertos, total, taxa, peso], i) => {\n        const rowBg = i % 2 === 0 ? '#fff' : '#e8f6fb';\n        const barColor = barColorOf(taxa);\n        const pillBg = pillBgOf(taxa);\n        const pillFg = pillFgOf(taxa);\n        return React.createElement('tr', { key: nome, style: { background: rowBg } },\n          React.createElement('td', { style: { padding:'9px 13px', fontWeight:600, borderBottom:bd, fontSize:'12.5px', fontFamily:HN } }, nome),\n          React.createElement('td', { style: { padding:'9px 13px', textAlign:'center', fontSize:'12px', color:'#4a6b75', borderBottom:bd, fontFamily:HN } }, bloco),\n          React.createElement('td', { style: { padding:'9px 13px', textAlign:'center', fontWeight:600, borderBottom:bd, fontSize:'12.5px', fontFamily:HN } }, acertos),\n          React.createElement('td', { style: { padding:'9px 13px', textAlign:'center', borderBottom:bd, fontSize:'12.5px', fontFamily:HN } }, total),\n          React.createElement('td', { style: { padding:'9px 13px', textAlign:'center', borderBottom:bd } },\n            React.createElement('span', { style: { display:'inline-block', padding:'2px 9px', borderRadius:'20px', fontSize:'11.5px', fontWeight:700, background:pillBg, color:pillFg, fontFamily:HN } }, taxa + '%')\n          ),\n          React.createElement('td', { style: { padding:'9px 13px', borderBottom:bd, width:'120px' } },\n            React.createElement('div', { style: { width:'100%', height:'7px', background:'#e0eef4', borderRadius:'4px', overflow:'hidden' } },\n              React.createElement('div', { style: { height:'7px', borderRadius:'4px', background:barColor, width: taxa + '%' } })\n            )\n          ),\n          React.createElement('td', { style: { padding:'9px 13px', textAlign:'center', fontWeight:600, borderBottom:bd, fontSize:'12.5px', fontFamily:HN } }, peso)\n        );\n      }),\n      React.createElement('tr', { key:'total', style: { background:'#0c91b7' } },\n        React.createElement('td', { style: { padding:'10px 13px', fontSize:'12.5px', fontWeight:700, color:'#fff', fontFamily:HN } }, 'TOTAL GERAL'),\n        React.createElement('td', { style: { padding:'10px 13px', textAlign:'center', color:'#fff', fontFamily:HN } }, '—'),\n        React.createElement('td', { style: { padding:'10px 13px', textAlign:'center', fontSize:'12.5px', fontWeight:700, color:'#fff', fontFamily:HN } }, '49'),\n        React.createElement('td', { style: { padding:'10px 13px', textAlign:'center', fontSize:'12.5px', fontWeight:700, color:'#fff', fontFamily:HN } }, '60'),\n        React.createElement('td', { style: { padding:'10px 13px', textAlign:'center', fontSize:'12.5px', fontWeight:700, color:'#fff', fontFamily:HN } }, '81,67%'),\n        React.createElement('td', { style: { padding:'10px 13px', width:'120px' } },\n          React.createElement('div', { style: { width:'100%', height:'7px', background:'rgba(255,255,255,0.3)', borderRadius:'4px', overflow:'hidden' } },\n            React.createElement('div', { style: { height:'7px', borderRadius:'4px', background:'#cceffe', width:'81.67%' } })\n          )\n        ),\n        React.createElement('td', { style: { padding:'10px 13px', textAlign:'center', color:'#fff', fontFamily:HN } }, '—')\n      )\n    ];\n\n    const materiaTable = React.createElement('table',\n      { style: { width:'100%', borderCollapse:'collapse', fontFamily:HN, fontSize:'12px', minWidth:'540px' } },\n      thead,\n      React.createElement('tbody', null, ...materiaBodyRows)\n    );\n\n    return {\n      materias,\n      materiaTable,\n      showResumo:  act('resumo'),\n      showJornada: act('jornada'),\n      showMat:     act('mat'),\n      showGraf:    act('graf'),\n      showCalc:    act('calc'),\n      showRec:     act('rec'),\n      showAvisos:  act('avisos'),\n      bgResumo:  bg('resumo'),  fgResumo:  fg('resumo'),\n      bgJornada: bg('jornada'), fgJornada: fg('jornada'),\n      bgMat:     bg('mat'),     fgMat:     fg('mat'),\n      bgGraf:    bg('graf'),    fgGraf:    fg('graf'),\n      bgCalc:    bg('calc'),    fgCalc:    fg('calc'),\n      bgRec:     bg('rec'),     fgRec:     fg('rec'),\n      bgAvisos:  bg('avisos'),  fgAvisos:  fg('avisos'),\n      goResumo:  () => this.setTab('resumo'),\n      goJornada: () => this.setTab('jornada'),\n      goMat:     () => this.setTab('mat'),\n      goGraf:    () => this.setTab('graf'),\n      goCalc:    () => this.setTab('calc'),\n      goRec:     () => this.setTab('rec'),\n      goAvisos:  () => this.setTab('avisos'),\n      doPrint:   () => window.print(),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
