<!DOCTYPE html>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* HEADER */

    flex: 1; min-width: 100px;

    font-size: 13px;

    white-space: nowrap;
    text-align: center;

  .tab-btn:hover { background: var(--bg); color: var(--primary); }
  .tab-btn.active { background: linear-gradient(135deg, #00637f, #0c91b7); color: white; box-shadow: 0 4px 12px rgba(0,99,127,0.3); }

  /* CARDS */
  .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 12px rgba(0,99,127,0.08); }

  @media (max-width: 768px) {

    .grid-3 { grid-template-columns: repeat(2, 1fr); }

  /* BANNER */
  .banner { border-radius: 12px; padding: 20px 24px; margin-bottom: 20px; display: flex; align-items: center; gap: 16px; }
  .banner.aprovado { background: linear-gradient(135deg, #dcfce7, #bbf7d0); border: 2px solid #86efac; }

  .banner.aprovado .banner-sub { color: #166534; }
  .banner.reprovado .banner-sub { color: #991b1b; }

  /* PROGRESS BAR */
  .progress-section { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 12px rgba(0,99,127,0.08); margin-bottom: 20px; }

  .cut-marker { position: absolute; top: -4px; height: 26px; width: 2px; background: #334155; border-radius: 2px; }
  .cut-label { position: absolute; top: 22px; font-size: 10px; font-weight: 700; color: #334155; transform: translateX(-50%); white-space: nowrap; }
  .cuts-info { display: flex; gap: 20px; margin-top: 28px; flex-wrap: wrap; }
  .cut-item { display: flex; align-items: center; gap: 8px; font-size: 13px; }

  .redacao-total { background: linear-gradient(135deg, #00637f, #0c91b7); color: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 16px rgba(0,99,127,0.25); display: flex; justify-content: space-between; align-items: center; }
  .redacao-total-label { font-size: 15px; font-weight: 700; opacity: 0.9; }

  .pct-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
  .pct-high { background: #dcfce7; color: #15803d; }
  .pct-mid { background: #fef9c3; color: #854d0e; }
  .pct-low { background: #fee2e2; color: #b91c1c; }

  /* CHARTS */
  .chart-container { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,99,127,0.08); }
  .chart-title { font-size: 16px; font-weight: 700; color: var(--primary); margin-bottom: 20px; }
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  @media (max-width: 700px) { .charts-row { grid-template-columns: 1fr; } }

  /* CALC */
  .calc-step { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 12px rgba(0,99,127,0.08); margin-bottom: 14px; border-left: 5px solid var(--tertiary); }
  .calc-step-num { font-size: 11px; font-weight: 800; color: var(--secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .calc-step-title { font-size: 15px; font-weight: 700; color: var(--gray-700); margin-bottom: 8px; }
  .calc-formula { background: var(--gray-50); border-radius: 8px; padding: 12px 16px; font-family: 'Courier New', monospace; font-size: 14px; color: var(--primary); font-weight: 600; margin-top: 8px; border: 1px solid var(--gray-200); }
  .calc-result { background: linear-gradient(135deg, #00637f, #0c91b7); color: white; border-radius: 12px; padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 16px rgba(0,99,127,0.25); }

  /* RECOMENDACOES */
  .rec-item { background: white; border-radius: 12px; padding: 18px 20px; box-shadow: 0 2px 12px rgba(0,99,127,0.08); margin-bottom: 12px; display: flex; gap: 16px; align-items: flex-start; }
  .rec-priority { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; flex-shrink: 0; }
  .rec-p1 { background: #fee2e2; color: #b91c1c; }
  .rec-p2 { background: #fef9c3; color: #854d0e; }
  .rec-p3 { background: #dcfce7; color: #15803d; }
  .rec-content-title { font-size: 15px; font-weight: 700; color: var(--gray-700); margin-bottom: 4px; }
  .rec-content-text { font-size: 13px; color: var(--gray-500); line-height: 1.5; }

  /* AVISOS */
  .aviso-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 12px rgba(0,99,127,0.08); margin-bottom: 14px; }
  .aviso-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .aviso-icon { font-size: 24px; }

  .section-title { font-size: 18px; font-weight: 800; color: var(--primary); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

  .footer { text-align: center; margin-top: 32px; color: var(--gray-500); font-size: 12px; }
  .footer span { color: var(--primary); font-weight: 700; }

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const DATA = {
  cliente: "Lucinele Siebra",
  concurso: "Tribunal de Justiça (TJ)",
  cargo: "Técnico Judiciário",
  area: "Analista Judiciário",
  edital: "Novo Edital",
  simulado: "Simulado 1 - TJAL 2024",
  primeiroSimulado: "Sim",
  notaCorteGeral: 6,
  notaCorteCotas: 4.8,
  resultados: {
    totalQuestoes: 60,
    totalAcertos: 49,
    totalErros: 11,
    aproveitamento: 81.67,
    notaObjetiva: 8.17,
    aprovado: true,
    materias: {
      "Língua Portuguesa": { acertos: 16, erros: 4, total: 20 },
      "Legislação Específica - AL": { acertos: 7, erros: 3, total: 10 },
      "Noções de Direito Administrativo": { acertos: 5, erros: 0, total: 5 },
      "Noções de Direito Constitucional": { acertos: 5, erros: 0, total: 5 },
      "Noções de Direito Civil": { acertos: 5, erros: 0, total: 5 },
      "Noções de Direito Processual Civil": { acertos: 4, erros: 1, total: 5 },
      "Noções de Direito Penal": { acertos: 4, erros: 1, total: 5 },
      "Noções de Direito Processual Penal": { acertos: 3, erros: 2, total: 5 }
    },
    redacao: {
      "RECORTE TEMÁTICO": 2,
      "INTERPRETAÇÃO CRÍTICA": 1,
      "PROGRESSÃO": 2,
      "PROPRIEDADE VOCABULAR": 0.6,
      "COESÃO TEXTUAL": 1,
      "MORFOSSINTAXE": 0.3
    },
    totalRedacao: 6.9
  }
};

const TABS = [
  { id: 'resumo', label: '📊 Resumo' },
  { id: 'jornada', label: '🗓 Jornada' },
  { id: 'materias', label: '📚 Por Matéria' },
  { id: 'graficos', label: '📈 Gráficos' },
  { id: 'calculo', label: '🧮 Cálculo' },
  { id: 'recomendacoes', label: '🎯 Recomendações' },
  { id: 'avisos', label: '⚠️ Avisos' },
];

function getPctClass(pct) {
  if (pct >= 70) return 'pct-high';
  if (pct >= 50) return 'pct-mid';
  return 'pct-low';
}

function DonutChart() {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (chartRef.current) chartRef.current.destroy();
    const ctx = ref.current.getContext('2d');
    chartRef.current = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: ['Acertos', 'Erros'],
        datasets: [{
          data: [DATA.resultados.totalAcertos, DATA.resultados.totalErros],
          backgroundColor: ['#00637f', '#fca5a5'],
          borderWidth: 0,
          hoverOffset: 6
        }]
      },
      options: {
        cutout: '68%',
        plugins: {
          legend: { position: 'bottom', labels: { font: { family: 'Inter', size: 13, weight: '600' }, padding: 16 } },
          tooltip: { callbacks: { label: (c) => ` ${c.label}: ${c.raw} questões` } }
        }
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, []);
  return <canvas ref={ref} />;
}

function BarChart() {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (chartRef.current) chartRef.current.destroy();
    const materias = DATA.resultados.materias;
    const labels = Object.keys(materias).map(m => m.length > 22 ? m.substring(0, 22) + '…' : m);
    const fullLabels = Object.keys(materias);
    const values = Object.values(materias).map(m => parseFloat(((m.acertos / m.total) * 100).toFixed(1)));
    const colors = values.map(v => v >= 70 ? '#00637f' : v >= 50 ? '#d97706' : '#dc2626');
    const ctx = ref.current.getContext('2d');
    chartRef.current = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: 'Aproveitamento (%)',
          data: values,
          backgroundColor: colors,
          borderRadius: 6,
          borderSkipped: false,
        }]
      },
      options: {
        indexAxis: 'y',
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              title: (items) => fullLabels[items[0].dataIndex],
              label: (c) => ` ${c.raw}%`
            }
          }
        },
        scales: {
          x: {
            min: 0, max: 100,
            grid: { color: '#e2e8f0' },
            ticks: { callback: v => v + '%', font: { family: 'Inter', size: 11 } }
          },
          y: { grid: { display: false }, ticks: { font: { family: 'Inter', size: 11, weight: '600' } } }
        }
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, []);
  return <canvas ref={ref} />;
}

function TabResumo() {
  const r = DATA.resultados;
  const pct = r.notaObjetiva / 10 * 100;
  const corteGeralPct = DATA.notaCorteGeral / 10 * 100;
  const corteCotasPct = DATA.notaCorteCotas / 10 * 100;

  return (
    <div>
      <div className={`banner ${r.aprovado ? 'aprovado' : 'reprovado'}`}>
        <div className="banner-icon">{r.aprovado ? '✅' : '❌'}</div>
        <div>
          <div className="banner-title">{r.aprovado ? 'Aprovada na Nota Objetiva!' : 'Reprovada na Nota Objetiva'}</div>
          <div className="banner-sub">
            {r.aprovado
              ? `Sua nota ${r.notaObjetiva.toFixed(2)} supera o corte geral de ${DATA.notaCorteGeral.toFixed(2)}. Excelente desempenho!`
              : `Sua nota ${r.notaObjetiva.toFixed(2)} está abaixo do corte geral de ${DATA.notaCorteGeral.toFixed(2)}.`}
          </div>
        </div>
      </div>

      <div className="grid-4">
        <div className="card">
          <div className="card-title">Total de Questões</div>
          <div className="card-value">{r.totalQuestoes}</div>
          <div className="card-sub">neste simulado</div>
        </div>
        <div className="card">
          <div className="card-title">Acertos</div>
          <div className="card-value" style={{color:'#15803d'}}>{r.totalAcertos}</div>
          <div className="card-sub">questões corretas</div>
        </div>
        <div className="card">
          <div className="card-title">Erros</div>
          <div className="card-value" style={{color:'#dc2626'}}>{r.totalErros}</div>
          <div className="card-sub">questões incorretas</div>
        </div>
        <div className="card">
          <div className="card-title">Aproveitamento</div>
          <div className="card-value" style={{color:'#0c91b7'}}>{r.aproveitamento.toFixed(2)}%</div>
          <div className="card-sub">de acerto geral</div>
        </div>
      </div>

      <div className="progress-section">
        <div className="progress-header">
          <div className="progress-label">Nota Objetiva</div>
          <div className="progress-value">{r.notaObjetiva.toFixed(2)}</div>
        </div>
        <div className="progress-bar-bg">
          <div className="progress-bar-fill" style={{width: `${pct}%`}} />
          <div className="cut-marker" style={{left: `${corteGeralPct}%`}}>
            <div className="cut-label">{DATA.notaCorteGeral.toFixed(2)} Geral</div>
          </div>
          <div className="cut-marker" style={{left: `${corteCotasPct}%`, background:'#0c91b7'}}>
            <div className="cut-label" style={{color:'#0c91b7'}}>{DATA.notaCorteCotas.toFixed(2)} Cotas</div>
          </div>
        </div>
        <div className="cuts-info">
          <div className="cut-item"><div className="cut-dot" /><span className="cut-text">Corte Geral: <strong>{DATA.notaCorteGeral.toFixed(2)}</strong></span></div>
          <div className="cut-item"><div className="cut-dot" style={{background:'#0c91b7'}} /><span className="cut-text">Corte Cotas: <strong>{DATA.notaCorteCotas.toFixed(2)}</strong></span></div>
          <div className="cut-item"><div className="cut-dot" style={{background:'#00637f'}} /><span className="cut-text">Sua Nota: <strong>{r.notaObjetiva.toFixed(2)}</strong></span></div>
        </div>
      </div>

      <div className="section-title">📝 Critérios de Redação</div>
      <div className="redacao-grid">
        {Object.entries(r.redacao).map(([criterio, nota]) => (
          <div className="redacao-card" key={criterio}>
            <div className="redacao-card-title">{criterio}</div>
            <div className="redacao-card-value">{nota.toFixed(1)}</div>
          </div>
        ))}
      </div>
      <div className="redacao-total">
        <div className="redacao-total-label">📄 Total da Redação</div>
        <div className="redacao-total-value">{r.totalRedacao.toFixed(1)}</div>
      </div>
    </div>
  );
}

function TabJornada() {
  const r = DATA.resultados;
  return (
    <div>
      <div className="section-title">🗓 Sua Jornada nos Simulados</div>
      <div className="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Simulado</th>
              <th>Data</th>
              <th>Acertos</th>
              <th>Erros</th>
              <th>Total</th>
              <th>Aproveitamento</th>
              <th>Nota Obj.</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><strong>1</strong></td>
              <td className="td-materia">{DATA.simulado}</td>
              <td>2024</td>
              <td style={{color:'#15803d', fontWeight:700}}>{r.totalAcertos}</td>
              <td style={{color:'#dc2626', fontWeight:700}}>{r.totalErros}</td>
              <td>{r.totalQuestoes}</td>
              <td>
                <span className={`pct-badge ${getPctClass(r.aproveitamento)}`}>
                  {r.aproveitamento.toFixed(2)}%
                </span>
              </td>

function TabCalculo() {
  const r = DATA.resultados;
  return (
    <div>

        <div className="calc-step-num">Passo 1</div>

        </div>
      </div>

      <div className="calc-step">
        <div className="calc-step-num">Passo 2</div>
        <div className="calc-step-title">Cálculo do Aproveitamento Percentual</div>
        <div style={{fontSize:14, color:'var(--gray-700)', lineHeight:1.6}}>
          Divide-se o número de acertos pelo total de questões e multiplica-se por 100.
        </div>
        <div className="calc-formula">
          ({r.totalAcertos} ÷ {r.totalQuestoes}) × 100 = {r.aproveitamento.toFixed(4)}%
        </div>
      </div>

      <div className="calc-step">
        <div className="calc-step-num">Passo 3</div>
        <div className="calc-step-title">Conversão para Escala de 0 a 10</div>
        <div style={{fontSize:14, color:'var(--gray-700)', lineHeight:1.6}}>
          O aproveitamento percentual é dividido por 10 para obter a nota na escala de 0 a 10.
        </div>
        <div className="calc-formula">
          {r.aproveitamento.toFixed(4)}% ÷ 10 = {(r.aproveitamento / 10).toFixed(4)}
        </div>
      </div>

      <div className="calc-step">
        <div className="calc-step-num">Passo 4</div>
        <div className="calc-step-title">Arredondamento FCC (2 casas decimais)</div>
        <div style={{fontSize:14, color:'var(--gray-700)', lineHeight:1.6}}>
          A FCC utiliza arredondamento matemático padrão para 2 casas decimais. O valor bruto <strong>{(r.aproveitamento / 10).toFixed(4)}</strong> é arredondado para <strong>{r.notaObjetiva.toFixed(2)}</strong>.
        </div>
        <div className="calc-formula">
          {(r.aproveitamento / 10).toFixed(4)} → arredondado → {r.notaObjetiva.toFixed(2)}
        </div>
      </div>

      <div className="calc-step">
        <div className="calc-step-num">Passo 5</div>
        <div className="calc-step-title">Verificação da Nota de Corte</div>
        <div style={{fontSize:14, color:'var(--gray-700)', lineHeight:1.6}}>
          Compara-se a nota obtida com os cortes mínimos estabelecidos no edital.
        </div>
        <div className="calc-formula">
          Nota Obtida: {r.notaObjetiva.toFixed(2)} | Corte Geral: {DATA.notaCorteGeral.toFixed(2)} | Corte Cotas: {DATA.notaCorteCotas.toFixed(2)}{"\n"}
          {r.notaObjetiva.toFixed(2)} {'>'} {DATA.notaCorteGeral.toFixed(2)} → ✅ APROVADA no corte geral
        </div>
      </div>

      <div className="calc-result">
        <div>
          <div style={{fontSize:13, fontWeight:700, opacity:0.85, marginBottom:4}}>NOTA OBJETIVA FINAL</div>
          <div style={{fontSize:12, opacity:0.7}}>Simulado 1 - TJAL 2024 · {r.totalAcertos}/{r.totalQuestoes} questões</div>
        </div>
        <div style={{fontSize:42, fontWeight:800}}>{r.notaObjetiva.toFixed(2)}</div>
      </div>
    </div>
  );
}
