<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório de Desempenho - Aprendly</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #cceffe; min-height: 100vh; color: #1a2e38; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #cceffe; } ::-webkit-scrollbar-thumb { background: #0c91b7; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const DATA = {
  cliente: "Lucinele Siebra",
  concurso: "Tribunal de Justiça (TJ)",
  cargo: "Técnico Judiciário",
  area: "Área Judiciária",
  edital: "Novo Edital",
  simulado: "Simulado 1 - TJAL 2024",
  primeiroSimulado: "Sim",
  notaCorteGeral: 6,
  notaCorteCotas: 4.8,
  resultados: {
    totalQuestoes: 60,
    totalAcertos: 49,
    totalErros: 11,
    aproveitamento: 81.67,
    notaObjetiva: 8.17,
    aprovado: true,
    materias: {
      "Língua Portuguesa": { acertos: 16, erros: 4, total: 20 },
      "Legislação Específica - AL": { acertos: 7, erros: 3, total: 10 },
      "Noções de Direito Administrativo": { acertos: 5, erros: 0, total: 5 },
      "Noções de Direito Constitucional": { acertos: 5, erros: 0, total: 5 },
      "Noções de Direito Civil": { acertos: 5, erros: 0, total: 5 },
      "Noções de Direito Processual Civil": { acertos: 4, erros: 1, total: 5 },
      "Noções de Direito Penal": { acertos: 4, erros: 1, total: 5 },
      "Noções de Direito Processual Penal": { acertos: 3, erros: 2, total: 5 }
    },
    redacao: {
      "RECORTE TEMÁTICO": 2,
      "INTERPRETAÇÃO CRÍTICA": 1,
      "PROGRESSÃO": 2,
      "PROPRIEDADE VOCABULAR": 0.6,
      "COESÃO TEXTUAL": 1,
      "MORFOSSINTAXE": 0.3
    },
    totalRedacao: 6.9
  }
};

const CORES = {
  primaria: '#00637f',
  secundaria: '#0c91b7',
  terciaria: '#49bfe0',
  fundo: '#cceffe'
};

const REDACAO_MAX = {
  "RECORTE TEMÁTICO": 2.5,
  "INTERPRETAÇÃO CRÍTICA": 2.5,
  "PROGRESSÃO": 2.0,
  "PROPRIEDADE VOCABULAR": 1.0,
  "COESÃO TEXTUAL": 1.0,
  "MORFOSSINTAXE": 1.0
};

const styles = {
  app: { minHeight: '100vh', background: '#cceffe', paddingBottom: '40px' },
  header: {
    background: `linear-gradient(135deg, ${CORES.primaria} 0%, ${CORES.secundaria} 60%, ${CORES.terciaria} 100%)`,
    padding: '32px 24px 28px',
    color: '#fff',
    boxShadow: '0 4px 20px rgba(0,99,127,0.3)'
  },
  headerInner: { maxWidth: '960px', margin: '0 auto' },
  logo: { fontSize: '13px', fontWeight: 700, letterSpacing: '2px', opacity: 0.85, marginBottom: '12px', textTransform: 'uppercase' },
  clienteName: { fontSize: '28px', fontWeight: 800, marginBottom: '6px', lineHeight: 1.2 },
  simuladoName: { fontSize: '15px', fontWeight: 500, opacity: 0.9, marginBottom: '16px' },
  badgesRow: { display: 'flex', flexWrap: 'wrap', gap: '8px' },
  badge: { background: 'rgba(255,255,255,0.2)', border: '1px solid rgba(255,255,255,0.35)', borderRadius: '20px', padding: '4px 14px', fontSize: '12px', fontWeight: 600, backdropFilter: 'blur(4px)' },
  nav: { background: '#fff', borderBottom: '2px solid #e0f5ff', position: 'sticky', top: 0, zIndex: 100, boxShadow: '0 2px 12px rgba(0,99,127,0.08)' },
  navInner: { maxWidth: '960px', margin: '0 auto', display: 'flex', overflowX: 'auto', gap: '0' },
  navBtn: (active) => ({
    padding: '14px 18px', fontSize: '13px', fontWeight: active ? 700 : 500,
    color: active ? CORES.primaria : '#5a7a87', background: 'none', border: 'none',
    borderBottom: active ? `3px solid ${CORES.primaria}` : '3px solid transparent',
    cursor: 'pointer', whiteSpace: 'nowrap', transition: 'all 0.2s',
    letterSpacing: '0.3px'
  }),
  main: { maxWidth: '960px', margin: '0 auto', padding: '28px 16px' },
  card: { background: '#fff', borderRadius: '12px', padding: '20px', boxShadow: '0 2px 12px rgba(0,99,127,0.08)', border: '1px solid rgba(0,99,127,0.07)' },
  cardTitle: { fontSize: '13px', fontWeight: 600, color: '#5a7a87', textTransform: 'uppercase', letterSpacing: '0.8px', marginBottom: '8px' },
  cardValue: { fontSize: '32px', fontWeight: 800, color: CORES.primaria },
  cardSub: { fontSize: '12px', color: '#8aa5b0', marginTop: '2px' },
  grid4: { display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(130px, 1fr))', gap: '14px', marginBottom: '20px' },
  grid2: { display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))', gap: '14px', marginBottom: '20px' },
  banner: (ok) => ({
    borderRadius: '12px', padding: '18px 24px', marginBottom: '20px',
    background: ok ? 'linear-gradient(135deg, #00b894, #00d2a0)' : 'linear-gradient(135deg, #e17055, #d63031)',
    color: '#fff', display: 'flex', alignItems: 'center', gap: '12px',
    boxShadow: ok ? '0 4px 16px rgba(0,184,148,0.3)' : '0 4px 16px rgba(214,48,49,0.3)'
  }),
  bannerIcon: { fontSize: '28px' },
  bannerText: { flex: 1 },
  bannerTitle: { fontSize: '18px', fontWeight: 800 },
  bannerSub: { fontSize: '13px', opacity: 0.9, marginTop: '2px' },
  sectionTitle: { fontSize: '17px', fontWeight: 700, color: CORES.primaria, marginBottom: '14px', marginTop: '8px' },
  progressWrap: { background: '#e8f7fb', borderRadius: '8px', height: '14px', overflow: 'hidden', marginTop: '8px' },
  progressBar: (pct, color) => ({ width: `${pct}%`, height: '100%', background: color || `linear-gradient(90deg, ${CORES.primaria}, ${CORES.terciaria})`, borderRadius: '8px', transition: 'width 1s ease' }),
  table: { width: '100%', borderCollapse: 'collapse', fontSize: '14px' },
  th: { background: CORES.primaria, color: '#fff', padding: '11px 14px', textAlign: 'left', fontWeight: 600, fontSize: '12px', letterSpacing: '0.5px' },
  td: { padding: '10px 14px', borderBottom: '1px solid #e8f5fb', color: '#2a4a56' },
  tdCenter: { padding: '10px 14px', borderBottom: '1px solid #e8f5fb', color: '#2a4a56', textAlign: 'center' },
  tag: (color) => ({ display: 'inline-block', borderRadius: '6px', padding: '2px 10px', fontSize: '12px', fontWeight: 700, background: color + '20', color: color }),
  recTag: { display: 'inline-block', borderRadius: '6px', padding: '3px 10px', fontSize: '11px', fontWeight: 700 },
  redacaoGrid: { display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(240px, 1fr))', gap: '12px', marginBottom: '16px' },
  redacaoCard: { background: '#f4fbfe', borderRadius: '10px', padding: '14px 16px', border: '1px solid #c8edf8' },
  redacaoLabel: { fontSize: '11px', fontWeight: 700, color: '#5a7a87', textTransform: 'uppercase', letterSpacing: '0.6px', marginBottom: '6px' },
  redacaoScore: { fontSize: '22px', fontWeight: 800, color: CORES.primaria },
  redacaoMax: { fontSize: '12px', color: '#8aa5b0', fontWeight: 500 },
  recCard: { background: '#fff', borderRadius: '12px', padding: '18px', border: '1px solid #e0f3fa', marginBottom: '12px', boxShadow: '0 1px 6px rgba(0,99,127,0.06)' },
  avisoCard: { background: '#fff', borderRadius: '12px', padding: '18px', border: '1px solid #e0f3fa', marginBottom: '12px', boxShadow: '0 1px 6px rgba(0,99,127,0.06)' },
  stepCard: { background: '#f4fbfe', borderRadius: '10px', padding: '14px 18px', border: '1px solid #c8edf8', marginBottom: '10px' },
  stepNum: { width: '28px', height: '28px', borderRadius: '50%', background: CORES.primaria, color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 800, fontSize: '13px', flexShrink: 0 },
  stepRow: { display: 'flex', alignItems: 'flex-start', gap: '12px' },
  stepContent: { flex: 1 },
  stepTitle: { fontWeight: 700, color: CORES.primaria, fontSize: '14px', marginBottom: '4px' },
  stepText: { fontSize: '13px', color: '#3a5a6a', lineHeight: 1.6 },
  formula: { background: '#e8f5fb', borderRadius: '8px', padding: '10px 14px', fontFamily: 'monospace', fontSize: '13px', color: CORES.primaria, fontWeight: 600, marginTop: '6px', border: '1px dashed #a0d8ef' },
  totalRedacaoCard: { background: `linear-gradient(135deg, ${CORES.primaria}, ${CORES.secundaria})`, borderRadius: '12px', padding: '20px', color: '#fff', textAlign: 'center', marginBottom: '20px' },
  footer: { textAlign: 'center', marginTop: '32px', fontSize: '12px', color: '#6a9aaa', letterSpacing: '0.5px' }
};

function getPercentColor(pct) {
  if (pct >= 80) return '#00b894';
  if (pct >= 60) return '#f39c12';
  return '#e17055';
}

function TabResumo() {
  const r = DATA.resultados;
  const pctNota = (r.notaObjetiva / 10) * 100;
  const pctGeral = (DATA.notaCorteGeral / 10) * 100;
  const pctCotas = (DATA.notaCorteCotas / 10) * 100;

  return (
    <div>
      <div style={styles.banner(r.aprovado)}>
        <div style={styles.bannerIcon}>{r.aprovado ? '🏆' : '❌'}</div>
        <div style={styles.bannerText}>
          <div style={styles.bannerTitle}>{r.aprovado ? 'APROVADA NA NOTA OBJETIVA!' : 'REPROVADA NA NOTA OBJETIVA'}</div>
          <div style={styles.bannerSub}>
            {r.aprovado
              ? `Nota ${r.notaObjetiva.toFixed(2)} — Acima do corte geral (${DATA.notaCorteGeral.toFixed(2)}) e de cotas (${DATA.notaCorteCotas.toFixed(2)})`
              : `Nota ${r.notaObjetiva.toFixed(2)} — Abaixo do corte necessário`}
          </div>
        </div>
      </div>

      <div style={styles.grid4}>
        {[
          { label: 'Questões Totais', value: r.totalQuestoes, icon: '📋', sub: 'no simulado' },
          { label: 'Acertos', value: r.totalAcertos, icon: '✅', sub: `${((r.totalAcertos/r.totalQuestoes)*100).toFixed(1)}% do total` },
          { label: 'Erros', value: r.totalErros, icon: '❌', sub: `${((r.totalErros/r.totalQuestoes)*100).toFixed(1)}% do total` },
          { label: 'Aproveitamento', value: r.aproveitamento.toFixed(2) + '%', icon: '📊', sub: 'desempenho geral' }
        ].map((c, i) => (
          <div key={i} style={styles.card}>
            <div style={{fontSize:'22px', marginBottom:'6px'}}>{c.icon}</div>
            <div style={styles.cardTitle}>{c.label}</div>
            <div style={{...styles.cardValue, fontSize: i === 3 ? '24px' : '32px'}}>{c.value}</div>
            <div style={styles.cardSub}>{c.sub}</div>
          </div>
        ))}
      </div>

      <div style={styles.card}>
        <div style={styles.sectionTitle}>📈 Nota Objetiva</div>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-end', marginBottom:'8px'}}>
          <span style={{fontSize:'36px', fontWeight:800, color: CORES.primaria}}>{r.notaObjetiva.toFixed(2)}</span>
          <span style={{fontSize:'14px', color:'#8aa5b0', fontWeight:500}}>de 10,00</span>
        </div>
        <div style={{position:'relative', marginBottom:'18px'}}>
          <div style={styles.progressWrap}>
            <div style={styles.progressBar(pctNota, `linear-gradient(90deg, ${CORES.primaria}, ${CORES.terciaria})`)}></div>
          </div>
          <div style={{position:'absolute', left:`${pctGeral}%`, top:'-20px', transform:'translateX(-50%)', fontSize:'11px', fontWeight:700, color:'#e17055', whiteSpace:'nowrap'}}>Corte Geral</div>
          <div style={{position:'absolute', left:`${pctGeral}%`, top:0, width:'2px', height:'14px', background:'#e17055', transform:'translateX(-50%)'}}></div>
          <div style={{position:'absolute', left:`${pctCotas}%`, top:'-20px', transform:'translateX(-50%)', fontSize:'11px', fontWeight:700, color:'#f39c12', whiteSpace:'nowrap'}}>Corte Cotas</div>
          <div style={{position:'absolute', left:`${pctCotas}%`, top:0, width:'2px', height:'14px', background:'#f39c12', transform:'translateX(-50%)'}}></div>
        </div>
        <div style={{display:'flex', gap:'16px', flexWrap:'wrap', marginTop:'10px'}}>
          <div style={{display:'flex', alignItems:'center', gap:'6px'}}>
            <div style={{width:'12px', height:'12px', borderRadius:'2px', background:'#e17055'}}></div>
            <span style={{fontSize:'12px', color:'#5a7a87'}}>Corte Geral: <b>{DATA.notaCorteGeral.toFixed(2)}</b></span>
          </div>
          <div style={{display:'flex', alignItems:'center', gap:'6px'}}>
            <div style={{width:'12px', height:'12px', borderRadius:'2px', background:'#f39c12'}}></div>
            <span style={{fontSize:'12px', color:'#5a7a87'}}>Corte Cotas: <b>{DATA.notaCorteCotas.toFixed(2)}</b></span>
          </div>
        </div>
      </div>

      <div style={{...styles.sectionTitle, marginTop:'24px'}}>✍️ Desempenho na Redação</div>
      <div style={styles.redacaoGrid}>
        {Object.entries(r.redacao).map(([crit, nota]) => {
          const max = REDACAO_MAX[crit] || 1;
          const pct = (nota / max) * 100;
          return (
            <div key={crit} style={styles.redacaoCard}>
              <div style={styles.redacaoLabel}>{crit}</div>
              <div style={{display:'flex', alignItems:'baseline', gap:'4px'}}>
                <span style={styles.redacaoScore}>{nota.toFixed(1)}</span>
                <span style={styles.redacaoMax}>/ {max.toFixed(1)}</span>
              </div>
              <div style={{...styles.progressWrap, marginTop:'8px', height:'8px'}}>
                <div style={styles.progressBar(pct, getPercentColor(pct))}></div>
              </div>
              <div style={{fontSize:'11px', color:'#8aa5b0', marginTop:'4px'}}>{pct.toFixed(0)}% do máximo</div>
            </div>
          );
        })}
      </div>
      <div style={styles.totalRedacaoCard}>
        <div style={{fontSize:'13px', fontWeight:700, opacity:0.85, textTransform:'uppercase', letterSpacing:'1px', marginBottom:'4px'}}>Total da Redação</div>
        <div style={{fontSize:'42px', fontWeight:800}}>{r.totalRedacao.toFixed(1)}</div>
        <div style={{fontSize:'13px', opacity:0.8}}>de 10,0 pontos</div>
      </div>
    </div>
  );
}

function TabJornada() {
  return (
    <div>
      <div style={styles.sectionTitle}>🗺️ Sua Jornada de Simulados</div>
      <div style={styles.card}>
        <p style={{fontSize:'13px', color:'#5a7a87', marginBottom:'16px'}}>Este é o seu primeiro simulado registrado. Continue praticando para acompanhar sua evolução!</p>
        <div style={{overflowX:'auto'}}>
          <table style={styles.table}>
            <thead>
              <tr>
                {['#', 'Simulado', 'Data', 'Acertos', 'Erros', 'Aproveitamento', 'Nota Obj.', 'Situação'].map(h => (
                  <th key={h} style={styles.th}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              <tr style={{background:'#f0faff'}}>
                <td style={styles.td}><b>1</b></td>
                <td style={styles.td}>{DATA.simulado}</td>
                <td style={styles.td}>—</td>
                <td style={styles.tdCenter}><span style={styles.tag('#00b894')}>{DATA.resultados.totalAcertos}</span></td>
                <td style={styles.tdCenter}><span style={styles.tag('#e17055')}>{DATA.resultados.totalErros}</span></td>
                <td style={styles.td}>
                  <div style={{display:'flex', alignItems:'center', gap:'8px'}}>
                    <div style={styles.progressWrap}>
                      <div style={{...styles.progressBar(DATA.resultados.aproveitamento, getPercentColor(DATA.resultados.aproveitamento)), height:'8px', borderRadius:'4px'}}></div>
                    </div>
                    <span style={{fontSize:'12px', fontWeight:700, color: getPercentColor(DATA.resultados.aproveitamento), minWidth:'42px'}}>{DATA.resultados.aproveitamento.toFixed(1)}%</span>
                  </div>
                </td>
                <td style={styles.tdCenter}><b style={{color: CORES.primaria}}>{DATA.resultados.notaObjetiva.toFixed(2)}</b></td>
                <td style={styles.tdCenter}>
                  <span style={{...styles.recTag, background:'#00b89420', color:'#00b894'}}>✓ APROVADA</span>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <div style={{marginTop:'18px', padding:'14px', background:'#f4fbfe', borderRadius:'8px', border:'1px dashed #a0d8ef'}}>
          <p style={{fontSize:'13px', color:'#5a7a87', textAlign:'center'}}>
            📌 <b>Dica:</b> A cada novo simulado realizado, seu histórico será atualizado aqui, permitindo visualizar sua evolução ao longo do tempo.
          </p>
        </div>
      </div>
    </div>
  );
}

function TabMaterias() {
  const materias = DATA.resultados.materias;
  const sorted = Object.entries(materias).sort((a, b) => {
    const pctA = (a[1].acertos / a[1].total) * 100;
    const pctB = (b[1].acertos / b[1].total) * 100;
    return pctA - pctB;
  });

  return (
    <div>
      <div style={styles.sectionTitle}>📚 Desempenho por Matéria</div>
      <div style={styles.card}>
        <div style={{overflowX:'auto'}}>
          <table style={styles.table}>
            <thead>
              <tr>
                {['Disciplina', 'Questões', 'Acertos', 'Erros', 'Aproveitamento', 'Status'].map(h => (
                  <th key={h} style={styles.th}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {sorted.map(([nome, d], i) => {
                const pct = (d.acertos / d.total) * 100;
                const color = getPercentColor(pct);
                return (
                  <tr key={nome} style={{background: i % 2 === 0 ? '#fff' : '#f8fdff'}}>
                    <td style={{...styles.td, fontWeight: 600}}>{nome}</td>
                    <td style={styles.tdCenter}>{d.total}</td>
                    <td style={styles.tdCenter}><span style={styles.tag('#00b894')}>{d.acertos}</span></td>
                    <td style={styles.tdCenter}><span style={d.erros > 0 ? styles.tag('#e17055') : styles.tag('#00b894')}>{d.erros}</span></td>
                    <td style={{...styles.td, minWidth:'160px'}}>
                      <div style={{display:'flex', alignItems:'center', gap:'8px'}}>
                        <div style={{flex:1, ...styles.progressWrap, height:'10px'}}>
                          <div style={{...styles.progressBar(pct, color), height:'10px', borderRadius:'5px'}}></div>
                        </div>
                        <span style={{fontSize:'12px', fontWeight:700, color, minWidth:'40px'}}>{pct.toFixed(0)}%</span>
                      </div>
                    </td>
                    <td style={styles.tdCenter}>
                      {pct === 100 ? <span style={{...styles.recTag, background:'#00b89420', color:'#00b894'}}>🌟 Perfeito</span>
                       : pct >= 80 ? <span style={{...styles.recTag, background:'#00b89420', color:'#00b894'}}>✓ Ótimo</span>
                       : pct >= 60 ? <span style={{...styles.recTag, background:'#f39c1220', color:'#f39c12'}}>⚠ Regular</span>
                       : <span style={{...styles.recTag, background:'#e1705520', color:'#e17055'}}>✗ Atenção</span>}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function TabGraficos() {
  const rosca = React.useRef(null);
  const barras = React.useRef(null);
  const roscaChart = React.useRef(null);
  const barrasChart = React.useRef(null);

  React.useEffect(() => {
    if (roscaChart.current) roscaChart.current.destroy();
    if (barrasChart.current) barrasChart.current.destroy();

    const r = DATA.resultados;
    roscaChart.current = new Chart(rosca.current, {
      type: 'doughnut',
      data: {
        labels: ['Acertos', 'Erros'],
        datasets: [{
          data: [r.totalAcertos, r.totalErros],
          backgroundColor: ['#00b894', '#e17055'],
          borderWidth: 3,
          borderColor: '#fff'
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { position: 'bottom', labels: { font: { family: 'Inter', size: 13 }, padding: 16 } },
          tooltip: { callbacks: { label: (ctx) => ` ${ctx.label}: ${ctx.raw} questões (${((ctx.raw / r.totalQuestoes)*100).toFixed(1)}%)` } }
        },
        cutout: '65%'
      }
    });

    const materias = Object.entries(r.materias);
    const labels = materias.map(([n]) => n.length > 25 ? n.substring(0, 25) + '…' : n);
    const pcts = materias.map(([, d]) => ((d.acertos / d.total) * 100).toFixed(1));
    const bgColors = pcts.map(p => p >= 80 ? '#00b89480' : p >= 60 ? '#f39c1280' : '#e1705580');
    const borderColors = pcts.map(p => p >= 80 ? '#00b894' : p >= 60 ? '#f39c12' : '#e17055');

    barrasChart.current = new Chart(barras.current, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: 'Aproveitamento (%)',
          data: pcts,
          backgroundColor: bgColors,
          borderColor: borderColors,
          borderWidth: 2,
          borderRadius: 6
        }]
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        scales: {
          x: { min: 0, max: 100, ticks: { callback: v => v + '%', font: { family: 'Inter' } }, grid: { color: '#e8f5fb' } },
          y: { ticks: { font: { family: 'Inter', size: 12 } }, grid: { display: false } }
        },
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: (ctx) => ` ${ctx.raw}%` } }
        }
      }
    });

    return () => {
      if (roscaChart.current) roscaChart.current.destroy();
      if (barrasChart.current) barrasChart.current.destroy();
    };
  }, []);

  return (
    <div>
      <div style={styles.sectionTitle}>📊 Visualização Gráfica</div>
      <div style={styles.grid2}>
        <div style={styles.card}>
          <div style={{...styles.cardTitle, marginBottom:'16px'}}>🍩 Acertos vs Erros</div>
          <div style={{position:'relative', display:'flex', justifyContent:'center', alignItems:'center'}}>
            <canvas ref={rosca} style={{maxHeight:'280px'}}></canvas>
            <div style={{position:'absolute', top:'50%', left:'50%', transform:'translate(-50%, -60%)', textAlign:'center', pointerEvents:'none'}}>
              <div style={{fontSize:'28px', fontWeight:800, color: CORES.primaria}}>{DATA.resultados.aproveitamento.toFixed(0)}%</div>
              <div style={{fontSize:'11px', color:'#8aa5b0', fontWeight:600}}>ACERTOS</div>
            </div>
          </div>
        </div>
        <div style={styles.card}>
          <div style={{...styles.cardTitle, marginBottom:'16px'}}>📏 Aproveitamento por Matéria</div>
          <div style={{display:'flex', gap:'10px', marginBottom:'12px', flexWrap:'wrap'}}>
            {[['#00b894','≥80% Ótimo'],['#f39c12','60-79% Regular'],['#e17055','<60% Atenção']].map(([c,l]) => (
              <div key={l} style={{display:'flex', alignItems:'center', gap:'5px'}}>
                <div style={{width:'10px', height:'10px', borderRadius:'2px', background:c}}></div>
                <span style={{fontSize:'11px', color:'#5a7a87'}}>{l}</span>
              </div>
            ))}
          </div>
          <canvas ref={barras} style={{maxHeight:'280px'}}></canvas>
        </div>
      </div>
    </div>
  );
}

function TabCalculo() {
  const r = DATA.resultados;
  const raw = (r.totalAcertos / r.totalQuestoes) * 10;
  const rawFixed = raw.toFixed(4);

  return (
    <div>
      <div style={styles.sectionTitle}>🧮 Cálculo da Nota Objetiva</div>

      {[
        {
          num: 1,
          title: 'Identificar os dados do simulado',
          text: `Total de questões: ${r.totalQuestoes} | Total de acertos: ${r.totalAcertos} | Total de erros: ${r.totalErros}`,
          formula: null
        },
        {
          num: 2,
          title: 'Aplicar a fórmula base',
          text: 'A nota objetiva é calculada pela razão entre acertos e total de questões, multiplicada por 10 (escala de 0 a 10):',
          formula: `Nota = (Acertos ÷ Total de Questões) × 10\nNota = (${r.totalAcertos} ÷ ${r.totalQuestoes}) × 10\nNota = ${(r.totalAcertos / r.totalQuestoes).toFixed(6)} × 10\nNota = ${rawFixed}`
        },
        {
          num: 3,
          title: 'Arredondamento FCC (2 casas decimais)',
          text: 'A FCC adota o arredondamento matemático padrão para 2 casas decimais. O terceiro decimal é observado: se ≥ 5, arredonda para cima; se < 5, trunca.',
          formula: `Nota bruta: ${rawFixed}\nTerceiro decimal: ${rawFixed.toString().split('.')[1]?.[2] || '0'} → ${parseInt(rawFixed.toString().split('.')[1]?.[2] || '0') >= 5 ? 'arredonda para cima ↑' : 'mantém ↓'}\nNota final: ${r.notaObjetiva.toFixed(2)}`
        },
        {
          num: 4,
          title: 'Verificação dos cortes',
          text: `Nota obtida: ${r.notaObjetiva.toFixed(2)} | Corte Geral: ${DATA.notaCorteGeral.toFixed(2)} | Corte Cotas: ${DATA.notaCorteCotas.toFixed(2)}`,
          formula: `${r.notaObjetiva.toFixed(2)} ≥ ${DATA.notaCorteGeral.toFixed(2)} (Corte Geral) → ${r.notaObjetiva >= DATA.notaCorteGeral ? '✅ APROVADA' : '❌ REPROVADA'}\n${r.notaObjetiva.toFixed(2)} ≥ ${DATA.notaCorteCotas.toFixed(2)} (Corte Cotas) → ${r.notaObjetiva >= DATA.notaCorteCotas ? '✅ APROVADA' : '❌ REPROVADA'}`
        }
      ].map(step => (
        <div key={step.num} style={styles.stepCard}>
          <div style={styles.stepRow}>
            <div style={styles.stepNum}>{step.num}</div>
            <div style={styles.stepContent}>
              <div style={styles.stepTitle}>{step.title}</div>
              <div style={styles.stepText}>{step.text}</div>
              {step.formula && (
                <pre style={styles.formula}>{step.formula}</pre>
              )}
            </div>
          </div>
        </div>
      ))}

      <div style={{...styles.card, marginTop:'16px', background:`linear-gradient(135deg, ${CORES.primaria}15, ${CORES.terciaria}20)`, border:`1px solid ${CORES.terciaria}`}}>
        <div style={{display:'flex', alignItems:'center', gap:'12px'}}>
          <div style={{fontSize:'32px'}}>🎯</div>
          <div>
            <div style={{fontSize:'14px', fontWeight:700, color: CORES.primaria}}>Resultado Final</div>
            <div style={{fontSize:'13px', color:'#3a5a6a', marginTop:'2px'}}>
              <b>{r.totalAcertos}</b> acertos em <b>{r.totalQuestoes}</b> questões → Nota <b style={{color: CORES.primaria, fontSize:'18px'}}>{r.notaObjetiva.toFixed(2)}</b> → <span style={{color:'#00b894', fontWeight:700}}>APROVADA ✓</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function TabRecomendacoes() {
  const materias = DATA.resultados.materias;
  const sorted = Object.entries(materias).sort((a, b) => b[1].erros - a[1].erros);
  const comErros = sorted.filter(([, d]) => d.erros > 0);
  const semErros = sorted.filter(([, d]) => d.erros === 0);

  const prioLabel = (erros, total) => {
    const pct = ((total - erros) / total) * 100;
    if (pct < 60) return { text: 'ALTA PRIORIDADE', bg: '#e1705520', color: '#e17055' };
    if (pct < 80) return { text: 'MÉDIA PRIORIDADE', bg: '#f39c1220', color: '#f39c12' };
    return { text: 'BAIXA PRIORIDADE', bg: '#00b89420', color: '#00b894' };
  };

  return (
    <div>
      <div style={styles.sectionTitle}>🎯 Recomendações de Estudo</div>

      <div style={{...styles.avisoCard, background:'#fff9e6', border:'1px solid #f0c040', marginBottom:'20px'}}>
        <div style={{display:'flex', gap:'10px', alignItems:'flex-start'}}>
          <span style={{fontSize:'20px'}}>💡</span>
          <div>
            <div style={{fontWeight:700, color:'#b8860b', marginBottom:'4px'}}>Estratégia Geral</div>
            <div style={{fontSize:'13px', color:'#7a6000', lineHeight:1.6}}>
              Você teve um ótimo desempenho neste simulado! Priorize manter e aprofundar o conhecimento nas matérias com erros. 
              Nas matérias zeradas, faça revisões periódicas para não perder o que já domina.
            </div>
          </div>
        </div>
      </div>

      {comErros.length > 0 && (
        <>
          <div style={{fontSize:'15px', fontWeight:700, color:'#e17055', marginBottom:'12px'}}>⚠️ Matérias que precisam de atenção</div>
          {comErros.map(([nome, d]) => {
            const pct = ((d.acertos / d.total) * 100);
            const prio = prioLabel(d.erros, d.total);
            return (
              <div key={nome} style={styles.recCard}>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', flexWrap:'wrap', gap:'8px', marginBottom:'10px'}}>
                  <div style={{fontWeight:700, fontSize:'15px', color: CORES.primaria}}>{nome}</div>
                  <span style={{...styles.recTag, background: prio.bg, color: prio.color}}>{prio.text}</span>
                </div>
                <div style={{display:'flex', gap:'16px', marginBottom:'10px', flexWrap:'wrap'}}>
                  <span style={{fontSize:'12px', color:'#5a7a87'}}><b style={{color:'#00b894'}}>{d.acertos}</b> acertos</span>
                  <span style={{fontSize:'12px', color:'#5a7a87'}}><b style={{color:'#e17055'}}>{d.erros}</b> erros</span>
                  <span style={{fontSize:'12px', color:'#5a7a87'}}>Total: <b>{d.total}</b></span>
                  <span style={{fontSize:'12px', color:'#5a7a87'}}>Aproveitamento: <b style={{color: getPercentColor(pct)}}>{pct.toFixed(0)}%</b></span>
                </div>
                <div style={styles.progressWrap}>
                  <div style={{...styles.progressBar(pct, getPercentColor(pct)), height:'10px', borderRadius:'5px'}}></div>
                </div>
                <div style={{marginTop:'10px', padding:'10px', background:'#f4fbfe', borderRadius:'8px', fontSize:'13px', color:'#3a5a6a', lineHeight:1.6}}>
                  {d.erros >= 3
                    ? `📖 Dedique sessões regulares de estudo a ${nome}. Revise os conteúdos base, resolva questões comentadas e identifique os tópicos com maior incidência nos editais do TJAL.`
                    : d.erros === 2
                    ? `📝 Revise os pontos de ${nome} onde errou. Analise o gabarito detalhado para entender o raciocínio esperado nas questões.`
                    : `🔍 Apenas 1 erro em ${nome}! Revise especificamente o tópico desta questão para fechar as lacunas.`}
                </div>
              </div>
            );
          })}
        </>
      )}

      {semErros.length > 0 && (
        <>
          <div style={{fontSize:'15px', fontWeight:700, color:'#00b894', marginBottom:'12px', marginTop:'20px'}}>🌟 Matérias com desempenho perfeito — mantenha o ritmo!</div>
          <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(200px, 1fr))', gap:'10px'}}>
            {semErros.map(([nome, d]) => (
              <div key={nome} style={{...styles.card, background:'#f0fff8', border:'1px solid #00b89430'}}>
                <div style={{fontSize:'18px', marginBottom:'4px'}}>✅</div>
                <div style={{fontWeight:600, fontSize:'13px', color: CORES.primaria, marginBottom:'4px'}}>{nome}</div>
                <div style={{fontSize:'12px', color:'#5a7a87'}}>{d.acertos}/{d.total} — 100%</div>
                <div style={{fontSize:'11px', color:'#00b894', marginTop:'4px', fontWeight:600}}>Revisão periódica</div>
              </div>
            ))}
          </div>
        </>
      )}

      <div style={{...styles.avisoCard, marginTop:'20px', background:'#f0f4ff', border:'1px solid #c0d0f0'}}>
        <div style={{display:'flex', gap:'10px', alignItems:'flex-start'}}>
          <span style={{fontSize:'20px'}}>📝</span>
          <div>
            <div style={{fontWeight:700, color:'#3a4a8a', marginBottom:'4px'}}>Sobre a Redação (nota: {DATA.resultados.totalRedacao.toFixed(1)})</div>
            <div style={{fontSize:'13px', color:'#3a4a6a', lineHeight:1.6}}>
              Sua redação precisa de atenção em <b>MORFOSSINTAXE (0,3/1,0)</b> e <b>PROPRIEDADE VOCABULAR (0,6/1,0)</b>. 
              Pratique a revisão gramatical dos seus textos, amplie o vocabulário formal-jurídico e trabalhe a coesão entre parágrafos. 
              Uma boa redação pode ser decisiva na classificação final!
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

      conteudo: `Você está se preparando para o ${DATA.concurso} — ${DATA.cargo} | ${DATA.area}.

      Fique atento às publicações oficiais do tribunal para confirmação das datas e do conteúdo programático definitivo.`,
      cor: '#e8f5ff', bordaCor: '#a0d8ef'
    },
    {
      icon: '🏅',
      titulo: 'Resultado deste Simulado',

4. Leia o edital com atenção para entender as fases do concurso.\n
5. Consulte a plataforma Aprendly para materiais complementares.`,
      cor: '#fffbf0', bordaCor: '#f0c04050'
    },
    {
      icon: '⚖️',
      titulo: 'Estrutura Típica do Concurso TJ',
      conteudo: `Os concursos para Técnico Judiciário geralmente são compostos por: Prova Objetiva (múltipla escolha) + Prova Discursiva/Redação.

    },
    {
      icon: '🔔',
      titulo: 'Atenção — Simulado vs. Prova Real',
      conteudo: `Este simulado é uma ferramenta de estudo e diagnóstico. A nota e a situação apresentadas (aprovada/reprovada) 
      refletem seu desempenho com base nos parâmetros do edital informado.

    }

  return (
    <div>
      <div style={styles.sectionTitle}>🔔 Informações e Avisos</div>
      {avisos.map((a, i) => (
        <div key={i} style={{...styles.avisoCard, background: a.cor, border: `1px solid ${a.bordaCor}`}}>
          <div style={{display:'flex', gap:'12px', alignItems:'flex-start'}}>
            <span style={{fontSize:'22px', flexShrink:0}}>{a.icon}</span>
            <div>
              <div style={{fontWeight:700, color: CORES.primaria, marginBottom:'6px', fontSize:'15px'}}>{a.titulo}</div>

            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

const TABS = [
  { id: 'resumo', label: '📊 Resumo', comp: TabResumo },
  { id: 'jornada', label: '🗺️ Jornada', comp: TabJornada },
  { id: 'materias', label: '📚 Por Matéria', comp: TabMaterias },
  { id: 'graficos', label: '📈 Gráficos', comp: TabGraficos },
  { id: 'calculo', label: '🧮 Cálculo', comp: TabCalculo },
  { id: 'recomendacoes', label: '🎯 Recomendações', comp: TabRecomendacoes },
  { id: 'avisos', label: '🔔 Avisos', comp: TabAvisos }
];

function App() {
  const [abaAtiva, setAbaAtiva] = React.useState('resumo');
  const TabComp = TABS.find(t => t.id === abaAtiva)?.comp || TabResumo;

  return (
    <div style={styles.app}>
      <header style={styles.header}>
        <div style={styles.headerInner}>
          <div style={styles.logo}>⚡ Aprendly — Relatório de Desempenho</div>
          <div style={styles.clienteName}>{DATA.cliente}</div>
          <div style={styles.simuladoName}>{DATA.simulado}</div>
          <div style={styles.badgesRow}>
            <span style={styles.badge}>🏛️ {DATA.concurso}</span>
            <span style={styles.badge}>💼 {DATA.cargo}</span>
            <span style={styles.badge}>📂 {DATA.area}</span>
            <span style={styles.badge}>📄 {DATA.edital}</span>
            {DATA.primeiroSimulado === 'Sim' && <span style={{...styles.badge, background:'rgba(255,215,0,0.25)', border:'1px solid rgba(255,215,0,0.5)'}}>🌟 1º Simulado</span>}
          </div>
        </div>
      </header>

      <nav style={styles.nav}>
        <div style={styles.navInner}>
          {TABS.map(t => (
            <button key={t.id} style={styles.navBtn(abaAtiva === t.id)} onClick={() => setAbaAtiva(t.id)}>
              {t.label}
            </button>
          ))}
        </div>
      </nav>

      <main style={styles.main}>
        <TabComp />
        <div style={styles.footer}>
          Gerado por <b>Aprendly</b> • Relatório de Simulado • {DATA.simulado}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
